<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Detail - Task Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <h1>📋 Task Management</h1>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="users.html">Users</a>
            <a href="tasks.html">Tasks</a>
            <a href="add-task.html">Add Task</a>
        </div>
    </nav>

    <div class="container">
        <h2>User Details</h2>

        <div id="alert-container"></div>

        <div class="card">
            <div class="card-title" id="user-title">Loading user...</div>
            <p><strong>Email:</strong> <span id="user-email">-</span></p>
            <p><strong>Total Tasks:</strong> <span id="user-task-count">0</span></p>
        </div>

        <div class="card">
            <div class="card-title">Assigned Tasks</div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Description</th>
                            <th>Status</th>
                            <th>Created</th>
                        </tr>
                    </thead>
                    <tbody id="user-tasks">
                        <tr><td colspan="4">Loading tasks...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <button class="btn btn-secondary" onclick="window.location.href='users.html'">← Back to Users</button>
    </div>

    <script src="app.js"></script>

</body>
</html>
