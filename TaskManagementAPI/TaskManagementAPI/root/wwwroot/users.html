<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Task Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <h1>📋 Task Management</h1>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="users.html">Users</a>
            <a href="tasks.html">Tasks</a>
            <a href="add-task.html">Add Task</a>
        </div>
    </nav>

    <div class="container">
        <h2>Users</h2>

        <div id="alert-container"></div>

        <div class="card">
            <div class="card-title">Add New User</div>
            <form id="add-user-form">
                <div class="form-group">
                    <label for="userName">User Name</label>
                    <input type="text" id="userName" class="form-control" required maxlength="100">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" required maxlength="100">
                </div>
                <button type="submit" class="btn btn-primary">Add User</button>
            </form>
        </div>

        <div class="card">
            <div class="card-title">User List</div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>User Name</th>
                            <th>Email</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="user-list">
                        <tr><td colspan="4">Loading users...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const API_BASE = 'https://localhost:7000/api';

        async function loadUsers() {
            try {
                const response = await fetch(`${API_BASE}/users`);
                const result = await handleResponse(response);
                const users = result.data || [];

                const tbody = document.getElementById('user-list');

                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">No users available.</td></tr>';
                    return;
                }

                tbody.innerHTML = users.map(user => `
                    <tr>
                        <td>${user.userId}</td>
                        <td>${user.userName}</td>
                        <td>${user.email}</td>
                        <td>
                            <button class="btn btn-primary btn-sm" onclick="viewUserTasks(${user.userId})">
                                View Tasks
                            </button>
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('user-list').innerHTML =
                    '<tr><td colspan="4">Error loading users.</td></tr>';
                showAlert('Failed to load users.', 'danger');
            }
        }

        // View user tasks
        function viewUserTasks(userId) {
            window.location.href = `user-detail.html?id=${userId}`;
        }

        // Add user
        document.getElementById('add-user-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const userName = document.getElementById('userName').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!userName) {
                showAlert('User name is required.', 'danger');
                return;
            }

            if (!email || !email.includes('@')) {
                showAlert('Valid email is required.', 'danger');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userName, email })
                });

                const result = await handleResponse(response);

                if (result.success) {
                    showAlert('User added successfully!', 'success');
                    document.getElementById('add-user-form').reset();
                    loadUsers();
                } else {
                    const errors = result.errors || [result.message];
                    showAlert(errors.join(', '), 'danger');
                }
            } catch (error) {
                console.error('Error adding user:', error);
                if (error.errors) {
                    showAlert(error.errors.join(', '), 'danger');
                } else {
                    showAlert('Failed to add user.', 'danger');
                }
            }
        });

        // Load users on page load
        document.addEventListener('DOMContentLoaded', loadUsers);
    </script>
</body>
</html>
