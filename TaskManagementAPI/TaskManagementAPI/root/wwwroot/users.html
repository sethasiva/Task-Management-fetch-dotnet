<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">✓</div>
      TaskManager
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <a href="dashboard.html" class="nav-link"><span class="nav-icon">🏠</span> Dashboard</a>
      <div class="nav-section-label">Manage</div>
      <a href="tasks.html"    class="nav-link"><span class="nav-icon">📋</span> Tasks</a>
      <a href="add-task.html" class="nav-link"><span class="nav-icon">➕</span> Add Task</a>
      <div class="nav-section-label">People</div>
      <a href="users.html"    class="nav-link"><span class="nav-icon">👥</span> Users</a>
    </nav>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <span class="topbar-title">Users</span>
    </header>

    <main class="page-content">
      <div style="display:grid;grid-template-columns:380px 1fr;gap:24px;align-items:start;">

        <!-- Add User Form -->
        <div class="card">
          <div class="card-header">
            <span>👤</span>
            <h2>Add New User</h2>
          </div>
          <div class="card-body">
            <div id="user-alert"></div>

            <div class="form-group">
              <label class="form-label" for="userName">Full Name <span class="req">*</span></label>
              <input type="text" id="userName" class="form-input"
                placeholder="Enter User Name" maxlength="100">
              <div class="form-hint">Max 100 characters</div>
            </div>

            <div class="form-group">
              <label class="form-label" for="email">Email Address <span class="req">*</span></label>
              <input type="email" id="email" class="form-input"
                placeholder="e.g. user@example.com" maxlength="100">
              <div class="form-hint">Must be unique. Max 100 characters.</div>
            </div>

            <button id="btn-add-user" class="btn btn-primary" onclick="addUser()" style="width:100%">
              + Add User
            </button>
          </div>
        </div>

        <!-- Users Table -->
        <div class="card">
          <div class="card-header">
            <span>👥</span>
            <h2>All Users</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width:60px">ID</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="users-tbody">
                <tr><td colspan="4"><div class="loading-overlay"><div class="loading-spinner-dark"></div></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
