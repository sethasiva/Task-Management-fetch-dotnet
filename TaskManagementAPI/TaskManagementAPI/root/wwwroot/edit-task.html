<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task - Task Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <h1>📋 Task Management</h1>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="users.html">Users</a>
            <a href="tasks.html">Tasks</a>
            <a href="add-task.html">Add Task</a>
        </div>
    </nav>

    <div class="container">
        <h2>Edit Task</h2>

        <div id="alert-container"></div>

        <div class="card">
            <form id="edit-task-form">
                <input type="hidden" id="taskId">

                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" class="form-control" required maxlength="200">
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" class="form-control" maxlength="500"></textarea>
                </div>
                <div class="form-group">
                    <label for="status">Status *</label>
                    <select id="status" class="form-control" required>
                        <option value="Todo">Todo</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Done">Done</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="userId">Assign To *</label>
                    <select id="userId" class="form-control" required>
                        <option value="">Select a user...</option>
                    </select>
                </div>
                <div class="actions">
                    <button type="submit" class="btn btn-primary">Update Task</button>
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='tasks.html'">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
 
</body>
</html>
