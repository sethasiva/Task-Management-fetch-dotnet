<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Task Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <h1>📋 Task Management</h1>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="users.html">Users</a>
            <a href="tasks.html">Tasks</a>
            <a href="add-task.html">Add Task</a>
        </div>
    </nav>

    <div class="container">
        <h2>Dashboard</h2>

        <div id="alert-container"></div>

        <div class="stats-grid" id="stats-grid">
            <div class="stat-card total">
                <div class="number" id="stat-total">0</div>
                <div class="label">Total Tasks</div>
            </div>
            <div class="stat-card todo">
                <div class="number" id="stat-todo">0</div>
                <div class="label">Todo</div>
            </div>
            <div class="stat-card in-progress">
                <div class="number" id="stat-inprogress">0</div>
                <div class="label">In Progress</div>
            </div>
            <div class="stat-card done">
                <div class="number" id="stat-done">0</div>
                <div class="label">Done</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Recent Tasks</div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Status</th>
                            <th>Assigned To</th>
                            <th>Created</th>
                        </tr>
                    </thead>
                    <tbody id="recent-tasks">
                        <tr><td colspan="4">Loading tasks...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>

</body>
</html>
