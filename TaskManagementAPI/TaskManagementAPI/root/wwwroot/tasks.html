<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Task Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <h1>📋 Task Management</h1>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="users.html">Users</a>
            <a href="tasks.html">Tasks</a>
            <a href="add-task.html">Add Task</a>
        </div>
    </nav>

    <div class="container">
        <h2>Task List</h2>

        <div id="alert-container"></div>

        <div class="search-box">
            <input type="text" id="search-input" class="form-control" placeholder="Search tasks by title...">
            <button class="btn btn-primary" onclick="searchTasks()">Search</button>
            <button class="btn btn-secondary" onclick="loadTasks()">Clear</button>
            <a href="add-task.html" class="btn btn-success" style="text-decoration: none;">+ Add Task</a>
        </div>

        <div class="container">
            <h2>Task Management</h2>

            <div id="alert-container"></div>

            <!-- Add Task Form -->
            <div class="card">
                <h3>Add New Task</h3>

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="title" class="form-control">
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" class="form-control"></textarea>
                </div>

                <div class="form-group">
                    <label>Assign User</label>
                    <select id="userId" class="form-control">
                        <option value="">Select User</option>
                    </select>
                </div>

                <button class="btn btn-primary" onclick="addTask()">
                    Add Task
                </button>
            </div>

            <!-- Task List -->
            <div class="card">
                <h3>Task List</h3>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Description</th>
                                <th>Status</th>
                                <th>User</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="task-list">
                            <tr>
                                <td colspan="6">Loading tasks...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    <script src="app.js"></script>
    <script>
        const API_BASE = "https://localhost:7000/api";

        // Load Users for Dropdown
        async function loadUsers() {
            try {
                const response = await fetch(`${API_BASE}/users`);
                const result = await response.json();

                const users = result.data || [];
                const select = document.getElementById("userId");

                select.innerHTML =
                    '<option value="">Select User</option>';

                users.forEach(user => {
                    select.innerHTML += `
                <option value="${user.userId}">
                    ${user.userName}
                </option>
            `;
                });

            } catch (error) {
                console.error(error);
            }
        }

        // Add Task
        async function addTask() {
            const task = {
                title: document.getElementById("title").value,
                description: document.getElementById("description").value,
                userId: parseInt(document.getElementById("userId").value)
            };

            try {
                const response = await fetch(`${API_BASE}/tasks`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(task)
                });

                const result = await response.json();

                if (result.success) {
                    alert("Task Added Successfully");

                    document.getElementById("title").value = "";
                    document.getElementById("description").value = "";
                    document.getElementById("userId").value = "";

                    loadTasks();
                } else {
                    alert(result.message);
                }

            } catch (error) {
                console.error(error);
                alert("Failed to add task");
            }
        }

        // Page Load
        document.addEventListener("DOMContentLoaded", () => {
            loadUsers();
            loadTasks();
        });
    </script>
</body>
</html>
