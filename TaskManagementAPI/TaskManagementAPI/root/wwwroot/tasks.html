<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">✓</div>
      TaskManager
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <a href="dashboard.html" class="nav-link"><span class="nav-icon">🏠</span> Dashboard</a>
      <div class="nav-section-label">Manage</div>
      <a href="tasks.html"    class="nav-link"><span class="nav-icon">📋</span> Tasks</a>
      <a href="add-task.html" class="nav-link"><span class="nav-icon">➕</span> Add Task</a>
      <div class="nav-section-label">People</div>
      <a href="users.html"    class="nav-link"><span class="nav-icon">👥</span> Users</a>
    </nav>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <span class="topbar-title">All Tasks</span>
      <div class="topbar-actions">
        <a href="add-task.html" class="btn btn-primary btn-sm">+ Add Task</a>
      </div>
    </header>

    <main class="page-content">
      <!-- Search bar -->
      <div class="search-bar">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" class="form-input"
            placeholder="Search tasks by title…">
        </div>
        <button id="search-btn" class="btn btn-primary">Search</button>
        <button id="clear-search" class="btn btn-outline">Clear</button>
      </div>

      <!-- Tasks table -->
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:50px">ID</th>
                <th>Title / Description</th>
                <th>Assigned To</th>
                <th>Status</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tasks-tbody">
              <tr><td colspan="7"><div class="loading-overlay"><div class="loading-spinner-dark"></div></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
